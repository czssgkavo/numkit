<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numkit IDE WASM Test</title>
</head>
<body>
    <h1>Numkit IDE WebAssembly</h1>
    <div id="output">Загрузка и инициализация модуля...</div>

    <script src="./numkit_ide.js"></script>

    <script>
        // Функция для вывода логов на экран
        function log(message) {
            console.log(message);
            document.getElementById('output').innerText = message;
        }

        // Если вы компилировали через Emscripten:
        // Обычно Emscripten создает глобальный объект Module (или функцию для его инициализации),
        // который автоматически находит .wasm файл в той же папке и загружает его.
        if (typeof Module !== 'undefined') {
            Module.onRuntimeInitialized = function() {
                log("Модуль успешно загружен через Emscripten!");
                // Здесь можно вызывать функции из C/C++ через ccall/cwrap или Module._имя_функции
            };
        } else {
            // Если у вас чистый (raw) WASM/JS без тяжелых оберток, 
            // загружаем его вручную через стандартный API:
            
            const importObject = {
                env: {
                    memory: new WebAssembly.Memory({ initial: 256 }),
                    abort: () => console.log("Abort!")
                }
            };

            WebAssembly.instantiateStreaming(fetch('./numkit_ide.wasm'), importObject)
                .then(result => {
                    log("WASM-модуль успешно загружен вручную!");
                    console.log("Экспортированные функции:", result.instance.exports);
                    
                    // Пример вызова функции, если она есть (замените на вашу функцию):
                    // const res = result.instance.exports.myFunction();
                })
                .catch(err => {
                    log("Ошибка загрузки WASM: " + err.message);
                });
        }
    </script>
</body>
</html>
