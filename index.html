<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numkit IDE WASM</title>
</head>
<body>
    <h1>Numkit IDE WebAssembly</h1>
    <div id="output">Загрузка и инициализация модуля...</div>

    <!-- 1. Подключаем JS-обертку от Emscripten -->
    <script src="./numkit_ide.js"></script>

    <!-- 2. Инициализируем модуль -->
    <script>
        function log(message) {
            console.log(message);
            document.getElementById('output').innerText = message;
        }

        // Вызываем функцию, которую экспортирует numkit_ide.js
        createNumkitIdeModule({
            // Вы можете переопределить функции вывода, если в C++ используется printf/std::cout
            print: (text) => console.log("WASM Print: ", text),
            printErr: (text) => console.error("WASM Error: ", text)
        }).then((Module) => {
            log("Модуль успешно загружен через Emscripten!");
            console.log("Готовый объект модуля:", Module);
            
            // Теперь вы можете обращаться к вашим функциям через объект Module
            // Например: Module._my_c_function() или Module.my_cpp_class
        }).catch((err) => {
            log("Критическая ошибка загрузки: " + err);
        });
    </script>
</body>
</html>
